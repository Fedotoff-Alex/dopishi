name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test (clean clone)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Package.swift requires swift-tools-version 6.2, which ships with Xcode 26+.
      # latest-stable picks the newest stable Xcode available on the runner.
      - name: Select Xcode (Swift 6.2+)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      # Caches the resolved dependencies (incl. the pinned LocalLLMClient fork + llama.cpp).
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: swift test
