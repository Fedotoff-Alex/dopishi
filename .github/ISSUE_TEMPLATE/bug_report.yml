name: Bug report
description: Something is broken or behaves unexpectedly
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please do NOT paste passwords, tokens, or other secrets.
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Type ...
        3. ...
    validations:
      required: true
  - type: input
    id: app
    attributes:
      label: In which app
      description: Where it happened (TextEdit, Notes, Mail, Slack, Claude, a browser, ...)
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. 14.5 (Apple Silicon)"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Dopishi version / commit
      placeholder: "git short SHA or tag"
  - type: checkboxes
    id: features
    attributes:
      label: Which features were enabled
      options:
        - label: Inline completion
        - label: Layout switch (auto / Option tap)
        - label: Spelling correction
        - label: Screen (OCR) context
        - label: Clipboard context
        - label: Memory
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: |
        Run from Terminal with debug flags and paste relevant lines (redact anything private):
        `DOPISHI_OCR_DEBUG=1 DOPISHI_LLM_TIMINGS=1 .../Dopishi.app/Contents/MacOS/Dopishi`
      render: text
